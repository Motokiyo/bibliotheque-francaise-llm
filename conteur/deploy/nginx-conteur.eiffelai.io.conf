map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name conteur.eiffelai.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name conteur.eiffelai.io;

    # Certbot should manage these paths.
    ssl_certificate /etc/letsencrypt/live/conteur.eiffelai.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/conteur.eiffelai.io/privkey.pem;

    access_log /var/log/nginx/conteur.access.log;
    error_log /var/log/nginx/conteur.error.log warn;

    client_max_body_size 2m;

    auth_basic "Eiffel AI Conteur";
    auth_basic_user_file /etc/nginx/.htpasswd-conteur;

    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for /ws/session.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
